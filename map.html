<!doctype html>
<html lang="bs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tour of Bosnia &amp; Herzegovina · Interactive Map</title>
<meta name="description" content="Explore the 2026 Tour of Bosnia and Herzegovina race route from Sarajevo to Neum — 5 stages with UNESCO heritage, viewpoints and Adriatic finale." />
<meta name="theme-color" content="#1a3d5c" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,600;0,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" />
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />

<style>
  :root{
    --sky:#1a3d5c;
    --sky-2:#245478;
    --sky-3:#3a7ab3;
    --ink:#0f1624;
    --ink-2:#2a2f3c;
    --dim:#6b7890;
    --muted:#9aa0b0;
    --panel:#ffffff;
    --panel-2:#f5f1e6;
    --cream:#faf6eb;
    --line:rgba(15,22,36,.08);
    --line-2:rgba(15,22,36,.14);
    --line-3:rgba(15,22,36,.22);
    --gold:#ffc840;
    --gold-deep:#e8a820;
    --route:#d64545;
    --route-dim:rgba(214,69,69,.28);
    --green:#5a8a3a;
    --shadow:0 4px 14px rgba(15,22,36,.10), 0 1px 3px rgba(15,22,36,.06);
    --shadow-lg:0 14px 36px rgba(15,22,36,.16), 0 4px 10px rgba(15,22,36,.06);
    --radius:10px;
    --radius-sm:6px;
    --display:"Fraunces",Georgia,serif;
    --sans:"Inter",-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;
    --h-header:52px;
    --h-strip:110px;
    --w-side:340px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--cream);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  body{overflow:hidden}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  a{color:inherit;text-decoration:none}

  /* ─ Shell ──────────────────────────────────────── */
  #app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--cream)}

  /* ─ Top header ─────────────────────────────────── */
  header.topbar{
    flex-shrink:0;height:var(--h-header);
    display:flex;align-items:center;padding:0 14px;gap:10px;
    background:var(--panel);border-bottom:1px solid var(--line);z-index:30;
  }
  .brand-min{display:flex;align-items:center;gap:8px;flex-shrink:0}
  .brand-min .mark{
    width:30px;height:30px;border-radius:6px;flex-shrink:0;
    background:linear-gradient(135deg, var(--sky-3) 0%, var(--sky) 60%, var(--gold) 100%);
    display:flex;align-items:center;justify-content:center;color:#fff;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.3);
  }
  .brand-min .nm{font-family:var(--display);font-weight:700;font-size:13px;color:var(--ink);letter-spacing:.01em;white-space:nowrap}
  .stage-picker{display:flex;gap:4px;padding:4px;background:var(--panel-2);border-radius:8px;overflow-x:auto;scrollbar-width:none}
  .stage-picker::-webkit-scrollbar{display:none}
  .stage-picker button{
    padding:6px 10px;font-family:var(--mono);font-size:11px;letter-spacing:.08em;font-weight:600;
    color:var(--dim);border-radius:5px;transition:all .12s;white-space:nowrap;
  }
  .stage-picker button:hover{color:var(--ink);background:rgba(15,22,36,.04)}
  .stage-picker button.on{background:var(--panel);color:var(--ink);box-shadow:0 1px 3px rgba(15,22,36,.08)}
  .stage-picker button.on .dot{background:var(--route)}
  .stage-picker button .dot{
    display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);margin-right:5px;vertical-align:middle;
  }
  .spacer{flex:1}
  .lang-pill{display:flex;background:var(--panel-2);border-radius:6px;overflow:hidden;padding:2px;gap:1px}
  .lang-pill button{
    padding:4px 8px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--dim);border-radius:4px;
  }
  .lang-pill button.on{background:var(--panel);color:var(--ink);font-weight:600;box-shadow:0 1px 2px rgba(15,22,36,.1)}
  .back-link{
    padding:5px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--sky);
    text-transform:uppercase;font-weight:600;white-space:nowrap;
  }
  .back-link:hover{color:var(--sky-2)}

  /* ─ Main body ──────────────────────────────────── */
  .body{position:relative;flex:1;min-height:0;display:flex}
  #map{position:absolute;inset:0}

  /* ─ Side panel ─────────────────────────────────── */
  aside.side{
    position:absolute;top:12px;right:12px;bottom:calc(var(--h-strip) + 12px);
    width:var(--w-side);z-index:10;
    background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow:hidden;
    transition:transform .25s;
  }
  .side-head{
    padding:14px 16px 12px;border-bottom:1px solid var(--line);position:relative;
  }
  .side-head .eye{
    font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--dim);text-transform:uppercase;font-weight:600;display:flex;align-items:center;gap:6px;
  }
  .side-head .eye .dot{width:7px;height:7px;border-radius:50%;background:var(--route)}
  .side-head h2{
    margin-top:6px;font-family:var(--display);font-size:20px;font-weight:600;color:var(--ink);line-height:1.15;letter-spacing:-.01em;
  }
  .side-head .stats{
    margin-top:10px;display:flex;gap:16px;flex-wrap:wrap;font-variant-numeric:tabular-nums;
  }
  .side-head .stats .s{display:flex;flex-direction:column;gap:2px}
  .side-head .stats .k{font-family:var(--mono);font-size:9px;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
  .side-head .stats .v{font-family:var(--display);font-size:17px;font-weight:600;color:var(--ink)}
  .side-head .stats .v small{font-family:var(--sans);font-size:11px;color:var(--dim);font-weight:400;margin-left:2px}
  .side-head .stars{color:var(--gold-deep);display:inline-flex;gap:1px;margin-top:2px}
  .side-head .stars svg{width:11px;height:11px}

  .side-body{flex:1;overflow-y:auto}
  .side-sub{padding:12px 16px 6px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--dim);text-transform:uppercase;font-weight:600}

  .hl-list{list-style:none;padding:0 10px 12px;margin:0}
  .hl-item{
    display:flex;gap:10px;padding:10px 8px;border-radius:var(--radius-sm);cursor:pointer;
    transition:background .12s;position:relative;
  }
  .hl-item:hover{background:var(--panel-2)}
  .hl-item.active{background:rgba(26,61,92,.08)}
  .hl-item .num{
    flex-shrink:0;width:26px;height:26px;display:flex;align-items:center;justify-content:center;
    background:var(--panel-2);border:1.5px solid var(--line-2);border-radius:50%;
    font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink);
  }
  .hl-item.start .num{background:var(--green);border-color:var(--green);color:#fff}
  .hl-item.finish .num{background:var(--route);border-color:var(--route);color:#fff}
  .hl-item.unesco .num{background:var(--gold);border-color:var(--gold);color:var(--ink)}
  .hl-item.viewpoint .num{background:#5cc97d;border-color:#5cc97d;color:#fff}
  .hl-item.culture .num{background:#8a5eb8;border-color:#8a5eb8;color:#fff}
  .hl-item.nature .num{background:#4a8ed8;border-color:#4a8ed8;color:#fff}
  .hl-item.aid .num{background:var(--sky);border-color:var(--sky);color:#fff}
  .hl-item.history .num{background:#a8712a;border-color:#a8712a;color:#fff}
  .hl-item .txt{flex:1;min-width:0}
  .hl-item .nm{font-size:13.5px;font-weight:600;color:var(--ink);line-height:1.25}
  .hl-item .sub{margin-top:3px;font-family:var(--mono);font-size:10px;color:var(--dim);letter-spacing:.04em}
  .hl-item .sub .tag{color:var(--sky);font-weight:600}
  .hl-item .desc{margin-top:6px;font-size:12.5px;color:var(--ink-2);line-height:1.5}

  .side-foot{
    padding:12px 14px;border-top:1px solid var(--line);background:var(--panel-2);
    display:flex;gap:8px;
  }
  .side-foot .btn{
    flex:1;padding:9px 10px;border-radius:var(--radius-sm);
    font-size:12px;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:5px;
    transition:all .12s;
  }
  .side-foot .btn.primary{
    background:var(--gold);color:var(--ink);
    box-shadow:0 1px 3px rgba(255,200,64,.3),inset 0 1px 0 rgba(255,255,255,.35);
  }
  .side-foot .btn.primary:hover{background:var(--gold-deep)}
  .side-foot .btn.ghost{background:var(--panel);color:var(--ink-2);border:1px solid var(--line-2)}
  .side-foot .btn.ghost:hover{background:var(--panel-2)}

  /* ─ Floating controls (top-right-ish, left of side panel) ─ */
  .ctrl-group{
    position:absolute;top:14px;left:14px;z-index:10;
    display:flex;flex-direction:column;gap:8px;
  }
  .ctrl{
    background:var(--panel);border:1px solid var(--line);border-radius:8px;
    box-shadow:var(--shadow);padding:3px;display:flex;
  }
  .ctrl button{
    padding:6px 10px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--dim);
    border-radius:5px;transition:all .12s;font-weight:600;text-transform:uppercase;
  }
  .ctrl button:hover{color:var(--ink)}
  .ctrl button.on{background:var(--sky);color:#fff}

  /* ─ Elevation strip ────────────────────────────── */
  .strip{
    flex-shrink:0;height:var(--h-strip);background:var(--panel);
    border-top:1px solid var(--line);padding:10px 16px 10px;
    display:flex;flex-direction:column;position:relative;z-index:15;
  }
  .strip-head{
    display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;
  }
  .strip-head .ttl{
    display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--ink);text-transform:uppercase;font-weight:600;
  }
  .strip-head .ttl svg{color:var(--route)}
  .strip-head .sub{font-family:var(--sans);font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums}
  .prof-wrap{flex:1;position:relative;min-height:0;margin-top:2px}
  #elev-svg{width:100%;height:100%;display:block;cursor:crosshair}
  .y-axis{position:absolute;left:0;top:0;bottom:14px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.06em;pointer-events:none;padding-top:2px}
  .x-axis{position:absolute;left:0;right:0;bottom:-2px;display:flex;justify-content:space-between;padding:0 2px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.06em;pointer-events:none}
  #prof-cur{position:absolute;top:0;bottom:14px;width:1px;background:var(--route);opacity:0;pointer-events:none;transition:opacity .1s}
  #prof-tip{
    position:absolute;transform:translate(-50%,-110%);z-index:3;
    background:var(--ink);color:#fff;border-radius:5px;padding:5px 9px;
    font-family:var(--mono);font-size:10px;letter-spacing:.04em;white-space:nowrap;
    pointer-events:none;opacity:0;transition:opacity .1s;
  }
  #prof-tip::after{
    content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:4px solid transparent;border-top-color:var(--ink);
  }

  /* ─ MapLibre light overrides ───────────────────── */
  .maplibregl-ctrl-attrib{
    background:rgba(255,255,255,.88)!important;color:var(--dim)!important;
    font-family:var(--mono)!important;font-size:9px!important;
  }
  .maplibregl-ctrl-attrib a{color:var(--sky)!important}
  .maplibregl-ctrl-group{
    background:var(--panel)!important;border:1px solid var(--line)!important;
    box-shadow:var(--shadow)!important;border-radius:6px!important;
  }
  .maplibregl-ctrl-scale{
    background:rgba(255,255,255,.85)!important;border-color:var(--line-2)!important;color:var(--ink-2)!important;
    font-family:var(--mono)!important;font-size:10px!important;
  }

  /* ─ Custom marker dot ──────────────────────────── */
  .mk{
    width:26px;height:26px;border-radius:50%;background:#fff;
    border:3px solid var(--sky);box-shadow:0 2px 6px rgba(15,22,36,.25);
    display:flex;align-items:center;justify-content:center;
    font-family:var(--mono);font-size:10px;font-weight:700;color:var(--ink);
    cursor:pointer;transition:transform .12s;
  }
  .mk:hover{transform:scale(1.15);box-shadow:0 4px 10px rgba(15,22,36,.3)}
  .mk.active{transform:scale(1.25);border-width:4px}
  .mk.start{border-color:var(--green);background:var(--green);color:#fff}
  .mk.finish{border-color:var(--route);background:var(--route);color:#fff}
  .mk.unesco{border-color:var(--gold);background:var(--gold)}
  .mk.viewpoint{border-color:#5cc97d;background:#5cc97d;color:#fff}
  .mk.culture{border-color:#8a5eb8;background:#8a5eb8;color:#fff}
  .mk.nature{border-color:#4a8ed8;background:#4a8ed8;color:#fff}
  .mk.aid{border-color:var(--sky);background:var(--sky);color:#fff}
  .mk.history{border-color:#a8712a;background:#a8712a;color:#fff}

  /* ─ Popup ──────────────────────────────────────── */
  .maplibregl-popup-content{
    background:var(--panel)!important;color:var(--ink)!important;
    border:1px solid var(--line)!important;border-radius:var(--radius)!important;
    padding:0!important;box-shadow:var(--shadow-lg)!important;
    font-family:var(--sans)!important;max-width:300px;overflow:hidden;
  }
  .maplibregl-popup-tip{border-top-color:var(--panel)!important;border-bottom-color:var(--panel)!important}
  .maplibregl-popup-close-button{color:var(--dim)!important;font-size:18px!important;padding:2px 8px!important;z-index:3}
  .pp{display:flex;flex-direction:column;position:relative}
  .pp .hero{
    height:56px;position:relative;border-bottom:1px solid var(--line);
    background:linear-gradient(135deg, var(--cat-color,#245478), rgba(255,255,255,.5));
  }
  .pp .hero::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:60%;
    background:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='300' height='40' viewBox='0 0 300 40' preserveAspectRatio='none'><path fill='rgba(255,255,255,.4)' d='M0,40 L0,20 L40,8 L80,18 L130,6 L180,22 L230,10 L280,20 L300,14 L300,40 Z'/></svg>") 0 100%/100% 100% no-repeat;
  }
  .pp .tag{
    position:absolute;top:8px;left:10px;z-index:2;display:inline-flex;align-items:center;gap:5px;
    padding:3px 8px;background:rgba(255,255,255,.95);border-radius:999px;
    font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);font-weight:700;
  }
  .pp .tag .sw{width:7px;height:7px;border-radius:50%}
  .pp .body{padding:12px 14px 14px}
  .pp .nm{font-family:var(--display);font-size:16px;font-weight:700;color:var(--ink);line-height:1.2;margin-bottom:6px}
  .pp .meta{display:flex;gap:10px;font-family:var(--mono);font-size:10px;letter-spacing:.05em;color:var(--dim);margin-bottom:10px}
  .pp .meta .v{color:var(--ink);font-weight:600}
  .pp .desc{font-size:13px;line-height:1.55;color:var(--ink-2);margin-bottom:12px}
  .pp .cta{
    display:inline-flex;align-items:center;gap:5px;padding:6px 10px;
    background:var(--sky);color:#fff;border-radius:5px;font-size:11px;font-weight:600;
    text-transform:uppercase;letter-spacing:.08em;transition:all .12s;
  }
  .pp .cta:hover{background:var(--sky-2)}

  /* ─ Toast ──────────────────────────────────────── */
  #toast{
    position:absolute;top:14px;left:50%;transform:translateX(-50%) translateY(-8px);z-index:50;
    padding:8px 14px;background:var(--ink);color:#fff;border-radius:6px;
    font-family:var(--mono);font-size:11px;opacity:0;transition:all .2s;pointer-events:none;
  }
  #toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  #toast.err{background:var(--route)}

  /* ─ Mobile ─────────────────────────────────────── */
  @media (max-width: 720px){
    :root{ --w-side:auto; --h-strip:90px }
    aside.side{
      left:12px;right:12px;top:auto;width:auto;max-height:45vh;bottom:calc(var(--h-strip) + 12px);
      transform:translateY(calc(100% - 48px));
    }
    aside.side.open{transform:translateY(0)}
    aside.side .side-body{overscroll-behavior:contain}
    .side-head::after{
      content:"▾";position:absolute;right:14px;top:14px;color:var(--sky);
      font-size:18px;transition:transform .2s;
    }
    aside.side.open .side-head::after{transform:rotate(180deg)}
    .brand-min .nm{display:none}
    .stage-picker button{padding:5px 8px;font-size:10px}
    .back-link span{display:none}
  }
</style>
</head>
<body>
<div id="app">

  <!-- ─ Top bar ────────────────────────────────────── -->
  <header class="topbar">
    <a class="brand-min" href="./">
      <div class="mark" aria-hidden="true">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6h3l-4.5 9l-4-7h5.5M9 6h2"/></svg>
      </div>
      <span class="nm">Tour of BiH</span>
    </a>

    <div class="stage-picker" id="stage-picker" role="tablist">
      <!-- populated by JS -->
    </div>

    <div class="spacer"></div>

    <a class="back-link" href="./" title="Back to landing">
      <span>← Back</span>
    </a>
    <div class="lang-pill" role="group" aria-label="Language">
      <button data-lang="bs" class="on">BS</button>
      <button data-lang="en">EN</button>
    </div>
  </header>

  <!-- ─ Map body ──────────────────────────────────── -->
  <div class="body">
    <div id="map"></div>
    <div id="toast" role="status" aria-live="polite"></div>

    <!-- Controls (top-left) -->
    <div class="ctrl-group">
      <div class="ctrl" id="basemap-ctrl" role="tablist" aria-label="Basemap">
        <button data-bm="satellite" class="on">Satelit</button>
        <button data-bm="topo">Topo</button>
        <button data-bm="streets">Ulice</button>
      </div>
      <div class="ctrl" id="view-ctrl" role="tablist" aria-label="View">
        <button data-v="2d" class="on">2D</button>
        <button data-v="3d">3D</button>
      </div>
    </div>

    <!-- Side panel -->
    <aside class="side" id="side" aria-label="Stage details">
      <div class="side-head" id="side-head">
        <div class="eye"><span class="dot"></span><span id="stage-eye">Etapa 1</span></div>
        <h2 id="stage-title">—</h2>
        <div class="stats">
          <div class="s"><div class="k" data-i18n="st.len">Dužina</div><div class="v" id="stat-km">—<small>km</small></div></div>
          <div class="s"><div class="k" data-i18n="st.gain">Uspon</div><div class="v" id="stat-gain">—<small>m</small></div></div>
          <div class="s"><div class="k" data-i18n="st.max">Max</div><div class="v" id="stat-max">—<small>m</small></div></div>
          <div class="s"><div class="k" data-i18n="st.diff">Težina</div><div class="v"><span class="stars" id="stat-diff"></span></div></div>
        </div>
      </div>
      <div class="side-body">
        <div class="side-sub" data-i18n="side.highlights">Znamenitosti na trasi</div>
        <ol class="hl-list" id="hl-list"></ol>
      </div>
      <div class="side-foot">
        <a class="btn primary" id="act-gpx" download>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3 L12 15 M7 10 L12 15 L17 10 M5 21 L19 21"/></svg>
          <span data-i18n="act.gpx">Preuzmi GPX</span>
        </a>
        <button class="btn ghost" id="act-fit">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 9 L4 4 L9 4 M15 4 L20 4 L20 9 M4 15 L4 20 L9 20 M15 20 L20 20 L20 15"/></svg>
          <span data-i18n="act.fit">Centriraj</span>
        </button>
      </div>
    </aside>
  </div>

  <!-- ─ Elevation strip ──────────────────────────── -->
  <div class="strip">
    <div class="strip-head">
      <div class="ttl">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 20 L9 10 L13 16 L16 12 L21 20z"/></svg>
        <span data-i18n="strip.prof">Profil etape</span>
      </div>
      <div class="sub" id="strip-sub">—</div>
    </div>
    <div class="prof-wrap" id="prof-wrap">

const CAT_COLOR = {
  start:"#5a8a3a", finish:"#d64545", unesco:"#ffc840",
  viewpoint:"#5cc97d", culture:"#8a5eb8", nature:"#4a8ed8",
  aid:"#1a3d5c", history:"#a8712a",
};

/* ─────────────────────────────────────────────────────
   State
   ───────────────────────────────────────────────────── */
const state = {
  map:null,
  routes:{},           // {key: {coords, stats}}
  activeKey:"stage1",
  basemap:"satellite",
  view3d:false,
  markers:[],          // active stage markers
  popup:null,
  styleReady:false,
  dataReady:false,
};

/* ─────────────────────────────────────────────────────
   Map build
   ───────────────────────────────────────────────────── */
function buildStyle(){
  return {
    version:8,
    sources:{ base:BASEMAPS[state.basemap] },
    layers:[{ id:"base", type:"raster", source:"base" }],
  };
}

function initMap(){
  state.map = new maplibregl.Map({
    container:"map",
    style:buildStyle(),
    center:[17.9, 43.5],
    zoom:7.5,
    hash:false,
    attributionControl:{ compact:true },
    pitchWithRotate:true,
  });
  state.map.addControl(new maplibregl.NavigationControl({ showCompass:true, visualizePitch:true }), "bottom-right");
  state.map.addControl(new maplibregl.ScaleControl({ maxWidth:100, unit:"metric" }), "bottom-left");

  state.map.on("load", onMapLoad);
  state.map.on("styledata", () => {
    // Re-add sources/layers after any setStyle() call
    if (state.dataReady && !state.map.getSource("route-all")) addRouteLayers();
  });
}

function onMapLoad(){
  state.styleReady = true;
  if (state.dataReady) addRouteLayers();
}

function addRouteLayers(){
  // One GeoJSON source with all stages; filter by active stage via paint expressions
  const features = Object.entries(state.routes).map(([key,r])=>({
    type:"Feature",
    properties:{ key },
    geometry:{ type:"LineString", coordinates:r.coords.map(c=>[c[0],c[1]]) }
  }));
  const fc = { type:"FeatureCollection", features };
  if (state.map.getSource("route-all")) {
    state.map.getSource("route-all").setData(fc);
  } else {
    state.map.addSource("route-all", { type:"geojson", data:fc });
    // Dimmed lines for all stages
    state.map.addLayer({
      id:"rt-dim",
      type:"line",
      source:"route-all",
      layout:{ "line-cap":"round", "line-join":"round" },
      paint:{
        "line-color":"#d64545",
        "line-opacity":0.28,
        "line-width":[
          "interpolate",["linear"],["zoom"],
          8,1.5, 12,2.5, 16,4
        ],
      },
    });
    // White halo for active stage
    state.map.addLayer({
      id:"rt-active-halo",
      type:"line",
      source:"route-all",
      layout:{ "line-cap":"round", "line-join":"round" },
      filter:["==",["get","key"], state.activeKey],
      paint:{
        "line-color":"#ffffff",
        "line-opacity":0.8,
        "line-width":[
          "interpolate",["linear"],["zoom"],
          8,5, 12,7, 16,9
        ],
      },
    });
    // Active stage line (bold red)
    state.map.addLayer({
      id:"rt-active",
      type:"line",
      source:"route-all",
      layout:{ "line-cap":"round", "line-join":"round" },
      filter:["==",["get","key"], state.activeKey],
      paint:{
        "line-color":"#d64545",
        "line-width":[
          "interpolate",["linear"],["zoom"],
          8,3, 12,4.5, 16,6
        ],
      },
    });
  }

  if (state.view3d) enable3D();
  renderStage(state.activeKey, { fit:true });
}

function enable3D(){
  if (!state.map.getSource("terrain")) state.map.addSource("terrain", TERRAIN_SRC);
  state.map.setTerrain({ source:"terrain", exaggeration:1.4 });
  state.map.easeTo({ pitch:55, bearing:-12, duration:600 });
}
function disable3D(){
  state.map.setTerrain(null);
  state.map.easeTo({ pitch:0, bearing:0, duration:500 });
}

/* ─────────────────────────────────────────────────────
   Markers & popups
   ───────────────────────────────────────────────────── */
function clearMarkers(){
  state.markers.forEach(m=>m.remove());
  state.markers = [];
}

/**
 * Snap a (lon, lat) to the nearest point on the active route's coords,
 * returning {coord, routeDist, snapDist}. If the landmark is on-route
 * already (snapDist < 500 m) the original coord is returned.
 */
function snapToRoute(pt, routeCoords){
  let best = Infinity, bestC = null;
  for (const c of routeCoords){
    const d = hav(pt, c);
    if (d < best){ best = d; bestC = c; }
  }
  return { coord:[bestC[0], bestC[1]], snapDist:best };
}

function renderMarkers(stage){
  clearMarkers();
  const route = state.routes[stage.key];
  const coords = route?.coords || [];
  stage.highlights.forEach((h,i)=>{
    // Snap the landmark to the nearest route point if it drifts off-route
    const snap = snapToRoute(h.coord, coords);
    const displayCoord = snap.snapDist > 500 ? snap.coord : h.coord;
    // cache for popup usage
    h._display = displayCoord;
    h._offRoute = snap.snapDist > 500 ? Math.round(snap.snapDist) : null;

    const el = document.createElement("div");
    el.className = "mk " + h.cat;
    el.textContent = (i+1);
    el.setAttribute("aria-label", h.name);
    el.addEventListener("click",(e)=>{
      e.stopPropagation();
      openPopup(stage, i);
      highlightListItem(i);
    });
    const marker = new maplibregl.Marker({ element:el, anchor:"center" })
      .setLngLat(displayCoord)
      .addTo(state.map);
    state.markers.push(marker);
  });
}

function openPopup(stage, i){
  const h = stage.highlights[i];
  const color = CAT_COLOR[h.cat] || "#245478";
  const catLabel = t("cat."+h.cat, h.cat);
  const desc = (h.desc && h.desc[LANG]) || h.desc?.bs || "";
  // Always send Directions to the real landmark, not the snap point
  const gmaps = `https://www.google.com/maps/dir/?api=1&destination=${h.coord[1]},${h.coord[0]}`;
  const offBadge = h._offRoute
    ? `<span style="margin-left:6px;padding:2px 7px;background:var(--panel-2);border-radius:3px;font-size:9px;letter-spacing:.1em;color:var(--ink-2);text-transform:uppercase;font-weight:600">${LANG==="bs"?"~"+Math.round(h._offRoute/1000)+" km off route":"~"+Math.round(h._offRoute/1000)+" km off course"}</span>`
    : "";
  const html = `<div class="pp">
    <div class="hero" style="--cat-color:${color}"></div>
    <span class="tag"><span class="sw" style="background:${color}"></span>${catLabel}${offBadge}</span>
    <div class="body">
      <div class="nm">${escapeHtml(h.name)}</div>
      <div class="meta">
        <span>${t("pop.km")} · <span class="v">${h.km.toFixed(1)}</span></span>
        <span>${t("pop.ele")} · <span class="v">${h.ele} m</span></span>
      </div>
      <div class="desc">${escapeHtml(desc)}</div>
      <a class="cta" href="${gmaps}" target="_blank" rel="noreferrer">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12 L19 12 M13 6 L19 12 L13 18"/></svg>
        ${t("pop.cta")}
      </a>
    </div>
  </div>`;
  if (state.popup) state.popup.remove();
  state.popup = new maplibregl.Popup({ offset:18, maxWidth:"300px" })
    .setLngLat(h._display || h.coord)
    .setHTML(html)
    .addTo(state.map);
}

function escapeHtml(s){
  return (s||"").toString().replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

/* ─────────────────────────────────────────────────────
   Stage switching
   ───────────────────────────────────────────────────── */
// Side-panel + elevation + chrome (works without the map being ready)
function renderStagePanels(key){
  const stage = STAGES.find(s=>s.key===key);
  const route = state.routes[key];
  if (!stage || !route) return false;
  state.activeKey = key;

  renderSidePanel(stage, route);
  renderElevation(route);

  // Stage-picker pill
  document.querySelectorAll("#stage-picker button").forEach(b=>{
    b.classList.toggle("on", b.dataset.k === key);
  });

  // Active GPX link
  const gpx = document.getElementById("act-gpx");
  gpx.href = `gpx/${key}.gpx`;
  gpx.download = `Tour_of_BiH_${key}.gpx`;
  return true;
}

// Full render (panels + map markers + optional fit). Safe to call any time;
// map-dependent parts silently skip until the style is ready.
function renderStage(key, opts={}){
  if (!renderStagePanels(key)) return;
  const stage = STAGES.find(s=>s.key===key);
  const route = state.routes[key];

  // Map-layer update (only if layers exist)
  if (state.map && state.map.getLayer && state.map.getLayer("rt-active")) {
    state.map.setFilter("rt-active", ["==",["get","key"], key]);
    state.map.setFilter("rt-active-halo", ["==",["get","key"], key]);
  }

  // Markers (MapLibre queues them until the map is ready, so this is safe pre-load)
  if (state.map) renderMarkers(stage);

  // Camera fit (only if map is ready)
  if (opts.fit && state.styleReady) fitStage(stage, route);

  if (state.popup){ state.popup.remove(); state.popup = null; }
}

function fitStage(stage, route){
  const coords = route.coords;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for (const c of coords){
    if (c[0]<minX) minX=c[0]; if (c[0]>maxX) maxX=c[0];
    if (c[1]<minY) minY=c[1]; if (c[1]>maxY) maxY=c[1];
  }
  const w = window.innerWidth;
  const right = w>720 ? 380 : 20;
  const top = 80;
  const bottom = 40;
  state.map.fitBounds([[minX,minY],[maxX,maxY]], {
    padding:{ top, right, bottom, left:20 },
    duration:800,
    pitch: state.view3d?55:0,
    bearing: state.view3d?-12:0,
  });
}

/* ─────────────────────────────────────────────────────
   Side panel
   ───────────────────────────────────────────────────── */
function renderSidePanel(stage, route){
  const st = route.stats || {};
  document.getElementById("stage-eye").textContent =
    `${LANG==="bs"?"Etapa":"Stage"} ${stage.num} / ${STAGES.length}`;
  document.getElementById("stage-title").textContent = stage.title[LANG] || stage.title.bs;
  document.getElementById("stat-km").innerHTML = `${st.km ?? "—"}<small> km</small>`;
  document.getElementById("stat-gain").innerHTML = `${st.gain_m ?? "—"}<small> m</small>`;
  document.getElementById("stat-max").innerHTML = `${st.max_m ?? "—"}<small> m</small>`;
  document.getElementById("stat-diff").innerHTML = renderStars(stage.difficulty);

  const list = document.getElementById("hl-list");
  list.innerHTML = stage.highlights.map((h,i)=>`
    <li class="hl-item ${h.cat}" data-i="${i}">
      <div class="num">${i+1}</div>
      <div class="txt">
        <div class="nm">${escapeHtml(h.name)}</div>
        <div class="sub"><span class="tag">${escapeHtml(t("cat."+h.cat,h.cat))}</span> · ${h.km.toFixed(1)} km · ${h.ele} m</div>
      </div>
    </li>`).join("");
  list.querySelectorAll(".hl-item").forEach(li=>{
    li.addEventListener("click", ()=>{
      const i = +li.dataset.i;
      flyTo(stage.highlights[i]);
      openPopup(stage, i);
      highlightListItem(i);
    });
  });
}

function highlightListItem(i){
  document.querySelectorAll(".hl-item").forEach(li=>li.classList.remove("active"));
  const el = document.querySelector(`.hl-item[data-i="${i}"]`);
  if (el) el.classList.add("active");
}

function flyTo(h){
  state.map.flyTo({
    center: h._display || h.coord,
    zoom:Math.max(13, state.map.getZoom()),
    duration:800,
    essential:true,
  });
}

function renderStars(n){
  return Array.from({length:5}).map((_,i)=>
    i<n
      ? `<svg viewBox="0 0 24 24" fill="currentColor"><polygon points="12,2 15,9 22,10 17,15 18,22 12,18 6,22 7,15 2,10 9,9"/></svg>`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polygon points="12,2 15,9 22,10 17,15 18,22 12,18 6,22 7,15 2,10 9,9"/></svg>`
  ).join("");
}

/* ─────────────────────────────────────────────────────
   Elevation strip
   ───────────────────────────────────────────────────── */
function renderElevation(route){
  const svg = document.getElementById("elev-svg");
  const coords = route.coords;
  const st = route.stats || {};
  if (!coords || coords.length < 2) { svg.innerHTML=""; return; }

  // Cumulative distance along the track
  const cum = [0];
  for (let i=1;i<coords.length;i++){
    cum.push(cum[i-1] + hav(coords[i-1], coords[i]));
  }
  const total = cum[coords.length-1];
  let eMin = Infinity, eMax = -Infinity;
  for (const c of coords){
    if (c[2]<eMin) eMin=c[2];
    if (c[2]>eMax) eMax=c[2];
  }
  const range = Math.max(1, eMax - eMin);

  const W = 1000, H = 80, P = 4;
  const xs = cum.map(d => P + (d/total) * (W - 2*P));
  const ys = coords.map(c => P + (1 - (c[2]-eMin)/range) * (H - 2*P));

  const area = `M ${xs[0].toFixed(1)} ${H-P} L ` +
    xs.map((x,i)=>`${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(" L ") +
    ` L ${xs[xs.length-1].toFixed(1)} ${H-P} Z`;
  const line = "M " + xs.map((x,i)=>`${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(" L ");

  svg.innerHTML = `
    <defs>
      <linearGradient id="elevg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#d64545" stop-opacity="0.45"/>
        <stop offset="100%" stop-color="#ffc840" stop-opacity="0.10"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#elevg)"/>
    <path d="${line}" fill="none" stroke="#d64545" stroke-width="1.6" vector-effect="non-scaling-stroke"/>
  `;

  // Y-axis labels
  document.getElementById("y-axis").innerHTML =
    `<div>${Math.round(eMax)} m</div><div>${Math.round((eMax+eMin)/2)} m</div><div>${Math.round(eMin)} m</div>`;

  // X-axis labels
  const ticks = 5;
  let xh = "";
  for (let i=0;i<=ticks;i++){
    const km = ((st.km||0) * i/ticks).toFixed(0);
    xh += `<span>${km} km</span>`;
  }
  document.getElementById("x-axis").innerHTML = xh;

  document.getElementById("strip-sub").textContent =
    `${st.km?.toFixed(1) ?? "—"} km · ${st.gain_m ?? "—"} m ↑ · ${st.max_m ?? "—"} m max`;

  wireProfileHover(coords, cum, total, eMin, eMax);
}

function wireProfileHover(coords, cum, total, eMin, eMax){
  const wrap = document.getElementById("prof-wrap");
  const tip = document.getElementById("prof-tip");
  const cur = document.getElementById("prof-cur");
  wrap.onmousemove = (e)=>{
    const rc = wrap.getBoundingClientRect();
    const x = Math.max(0, Math.min(rc.width, e.clientX - rc.left));
    const frac = x / rc.width;
    const target = frac * total;
    let idx = 0;
    for (let i=0;i<cum.length;i++){
      if (cum[i] >= target){ idx = i; break; }
    }
    const km = (cum[idx]/1000).toFixed(1);
    const ele = Math.round(coords[idx][2]);
    tip.textContent = `${km} km · ${ele} m`;
    tip.style.left = x + "px";
    const range = Math.max(1, eMax - eMin);
    const yFrac = 1 - (coords[idx][2] - eMin) / range;
    tip.style.top = (yFrac * (rc.height - 14) + 4) + "px";
    tip.style.opacity = 1;
    cur.style.left = x + "px";
    cur.style.opacity = 0.8;
  };
  wrap.onmouseleave = ()=>{ tip.style.opacity = 0; cur.style.opacity = 0; };
}

function hav(a,b){
  const R = 6371000, toRad = x=>x*Math.PI/180;
  const dLat = toRad(b[1]-a[1]), dLon = toRad(b[0]-a[0]);
  const s1 = Math.sin(dLat/2), s2 = Math.sin(dLon/2);
  const q = s1*s1 + Math.cos(toRad(a[1]))*Math.cos(toRad(b[1]))*s2*s2;
  return 2*R*Math.atan2(Math.sqrt(q), Math.sqrt(1-q));
}

/* ─────────────────────────────────────────────────────
   Stage picker pills
   ───────────────────────────────────────────────────── */
function renderStagePicker(){
  const pick = document.getElementById("stage-picker");
  pick.innerHTML = STAGES.map(s=>`
    <button data-k="${s.key}" ${s.key===state.activeKey?'class="on"':""} role="tab">
      <span class="dot"></span>S${s.num}
    </button>
  `).join("");
  pick.querySelectorAll("button").forEach(b=>{
    b.addEventListener("click", ()=>{
      renderStage(b.dataset.k, { fit:true });
    });
  });
}

/* ─────────────────────────────────────────────────────
   Toasts
   ───────────────────────────────────────────────────── */
let toastT;
function toast(msg, err){
  const el = document.getElementById("toast");
  el.textContent = msg;
  el.classList.toggle("err", !!err);
  el.classList.add("on");
  clearTimeout(toastT);
  toastT = setTimeout(()=>el.classList.remove("on"), 3000);
}

/* ─────────────────────────────────────────────────────
   Data loading
   ───────────────────────────────────────────────────── */
async function loadRoutes(){
  try {
    const r = await fetch("_routes.json");
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    for (const [key, v] of Object.entries(data)){
      state.routes[key] = { coords:v.coords, stats:v.stats };
    }
    state.dataReady = true;
    // Immediately populate side panel + elevation + chrome from the data,
    // without waiting on the map to load. Progressive disclosure.
    renderStagePanels(state.activeKey);
    return true;
  } catch(e){
    toast((LANG==="bs"?"Greška pri učitavanju ruta: ":"Failed to load routes: ") + e.message, true);
    return false;
  }
}

/* ─────────────────────────────────────────────────────
   UI wiring
   ───────────────────────────────────────────────────── */
function wireUI(){
  // Language
  document.querySelectorAll(".lang-pill button").forEach(b=>{
    b.classList.toggle("on", b.dataset.lang===LANG);
    b.addEventListener("click", ()=>{
      document.querySelectorAll(".lang-pill button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      LANG = b.dataset.lang; localStorage.setItem("tobh.lang", LANG);
      document.documentElement.lang = LANG;
      applyI18n();
      renderStage(state.activeKey, { fit:false });
    });
  });
  // Basemap
  document.querySelectorAll("#basemap-ctrl button").forEach(b=>{
    b.addEventListener("click", ()=>{
      if (b.classList.contains("on")) return;
      document.querySelectorAll("#basemap-ctrl button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      state.basemap = b.dataset.bm;
      state.map.setStyle(buildStyle());
      // styledata listener re-adds route layers
    });
  });
  // View
  document.querySelectorAll("#view-ctrl button").forEach(b=>{
    b.addEventListener("click", ()=>{
      document.querySelectorAll("#view-ctrl button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      state.view3d = b.dataset.v === "3d";
      if (state.view3d) enable3D(); else disable3D();
    });
  });
  // Fit action
  document.getElementById("act-fit").addEventListener("click", ()=>{
    const stage = STAGES.find(s=>s.key===state.activeKey);
    const route = state.routes[state.activeKey];
    if (stage && route) fitStage(stage, route);
  });

  // Mobile: tap side-head to expand/collapse
  document.getElementById("side-head").addEventListener("click", ()=>{
    if (window.innerWidth <= 720) {
      document.getElementById("side").classList.toggle("open");
    }
  });

  window.addEventListener("resize", ()=>{
    const stage = STAGES.find(s=>s.key===state.activeKey);
    const route = state.routes[state.activeKey];
    // no automatic refit on resize — avoids jumping while the user types
  });
}

function applyI18n(){
  document.documentElement.lang = LANG;
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    const v = t(el.getAttribute("data-i18n"), null);
    if (v != null) el.textContent = v;
  });
}

/* ─────────────────────────────────────────────────────
   Boot
   ───────────────────────────────────────────────────── */
(async function boot(){
  applyI18n();
  renderStagePicker();
  initMap();
  wireUI();

  const ok = await loadRoutes();
  if (!ok) return;

  // If map already loaded, add layers; otherwise onMapLoad will do it
  if (state.styleReady) addRouteLayers();

  // Handle hash-deep-link: #stage3 etc.
  const hashKey = location.hash.replace("#","");
  if (hashKey && STAGES.some(s=>s.key===hashKey)) {
    state.activeKey = hashKey;
  }
  // final render (once both ready)
  if (state.styleReady && state.dataReady){
    renderStage(state.activeKey, { fit:true });
  }
})();
</script>
