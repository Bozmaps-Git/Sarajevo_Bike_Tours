<!doctype html>
<html lang="bs">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Tour of Bosnia &amp; Herzegovina · Interactive Race Dashboard</title>
<meta name="description" content="Interactive race dashboard for the Tour of Bosnia and Herzegovina — five stages from Sarajevo through Konjic, Jablanica, Mostar, Ljubuški and Stolac to Neum. Routes, elevation, aid stations, UNESCO heritage and tourism along the corridor." />
<meta name="theme-color" content="#0f1624" />
<meta property="og:title" content="Tour of Bosnia &amp; Herzegovina · 5 Stages · Sarajevo → Neum" />
<meta property="og:description" content="From alpine passes to the Adriatic coast — an interactive map of the Tour of BiH race route with aid stations, UNESCO sites and tourist highlights." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;0,700;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />

<style>
  :root{
    --bg:#0f1624;
    --panel:#18213a;
    --panel-2:#1f2b48;
    --panel-3:#2a3a5f;
    --ink:#ecf0f8;
    --ink-2:#d4dae8;
    --dim:#8a97b0;
    --muted:#6b7890;
    --line:rgba(236,240,248,.08);
    --line-2:rgba(236,240,248,.14);
    --line-3:rgba(236,240,248,.22);
    --amber:#ffc840;
    --amber-deep:#e6a820;
    --amber-soft:rgba(255,200,64,.14);
    --green:#5cc97d;
    --red:#e67272;
    --blue:#4a8ed8;
    --shadow:0 4px 16px rgba(0,0,0,.45),0 1px 3px rgba(0,0,0,.25);
    --shadow-lg:0 14px 40px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.3);
    --radius:10px;
    --radius-sm:6px;
    --display:"Fraunces",Georgia,serif;
    --sans:"Inter",-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:"JetBrains Mono",ui-monospace,Menlo,monospace;

    /* layout */
    --h-header:56px;
    --h-strip:108px;
    --w-panel:320px;
  }

  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow:hidden}
  button{font:inherit;color:inherit;background:none;border:none;cursor:pointer}
  a{color:inherit;text-decoration:none}
  .mono{font-family:var(--mono)}
  .tnum{font-variant-numeric:tabular-nums}

  /* ─ Shell ─────────────────────────────────────────── */
  #app{position:fixed;inset:0;display:flex;flex-direction:column;background:var(--bg)}

  /* ─ Header ────────────────────────────────────────── */
  header.topbar{
    flex-shrink:0;height:var(--h-header);
    position:relative;overflow:hidden;
    display:flex;align-items:center;padding:0 20px;gap:16px;
    border-bottom:1px solid var(--line);z-index:20;
  }
  header.topbar::before{
    content:"";position:absolute;inset:0;z-index:-2;
    background:
      linear-gradient(90deg, rgba(74,142,216,.18) 0%, rgba(15,22,36,.3) 40%, rgba(255,200,64,.10) 100%),
      linear-gradient(180deg, #1a2a48 0%, #131e35 60%, #0f1624 100%);
  }
  header.topbar::after{
    content:"";position:absolute;inset:0;z-index:-1;opacity:.55;
    background-image:
      /* far dinaric ridge */
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='60' viewBox='0 0 1600 60' preserveAspectRatio='none'><path fill='rgba(40,55,90,.85)' d='M0,60 L0,30 L70,18 L150,32 L220,10 L300,24 L380,14 L460,26 L540,12 L620,22 L700,8 L780,20 L860,14 L940,26 L1020,18 L1100,30 L1180,16 L1260,26 L1340,14 L1420,24 L1500,18 L1580,28 L1600,22 L1600,60 Z'/></svg>"),
      /* near ridge */
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='1600' height='60' viewBox='0 0 1600 60' preserveAspectRatio='none'><path fill='rgba(20,30,52,.9)' d='M0,60 L0,42 L60,28 L140,44 L210,26 L300,40 L380,30 L460,46 L540,32 L630,44 L710,30 L800,42 L880,34 L970,48 L1050,34 L1140,46 L1230,32 L1320,44 L1390,34 L1470,42 L1560,36 L1600,42 L1600,60 Z'/></svg>");
    background-position:0 100%,0 100%;
    background-repeat:no-repeat;background-size:100% 100%,100% 100%;
    mix-blend-mode:normal;
  }
  .brand{display:flex;align-items:center;gap:10px;min-width:0}
  .brand .mark{
    width:36px;height:36px;flex-shrink:0;border-radius:8px;
    background:linear-gradient(135deg, #4a8ed8 0%, #2a5caa 50%, #ffc840 100%);
    display:flex;align-items:center;justify-content:center;color:#fff;
    box-shadow:0 2px 8px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.25);
  }
  .brand .name{
    font-family:var(--display);font-weight:700;font-size:16px;letter-spacing:.02em;
    color:var(--ink);text-transform:uppercase;line-height:1;white-space:nowrap;
    text-shadow:0 1px 2px rgba(0,0,0,.6);
  }
  .brand .name em{font-style:normal;color:var(--amber)}
  .brand .tag{
    margin-top:3px;font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--amber);text-transform:uppercase;
  }
  .topnav{display:flex;align-items:center;gap:2px;margin-left:auto}
  .topnav button{
    padding:8px 14px;font-family:var(--sans);font-size:13px;font-weight:500;
    color:var(--dim);border-radius:6px;transition:all .15s;display:flex;align-items:center;gap:6px;
  }
  .topnav button:hover{color:var(--ink);background:rgba(244,236,224,.06)}
  .topnav button.on{color:var(--ink);background:rgba(244,236,224,.08)}
  .topnav button.on::before{content:"";display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--amber)}
  .topnav .sep{width:1px;height:18px;background:var(--line-2);margin:0 4px}
  .lang-pill{
    display:flex;background:rgba(20,16,12,.5);border:1px solid var(--line-2);border-radius:4px;overflow:hidden;
    margin-left:8px;
  }
  .lang-pill button{
    padding:4px 8px;font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--dim);
  }
  .lang-pill button.on{background:var(--amber-soft);color:var(--amber)}

  /* ─ Map wrap ──────────────────────────────────────── */
  .body{position:relative;flex:1;min-height:0;display:flex}
  #map{position:absolute;inset:0}

  /* ─ Layer pill bar (top center of map) ───────────── */
  .layer-bar{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:10;
    display:flex;background:rgba(30,24,18,.92);border:1px solid var(--line-2);border-radius:10px;padding:4px;
    box-shadow:var(--shadow);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  }
  .layer-pill{
    display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:7px;
    font-family:var(--sans);font-size:12.5px;font-weight:500;color:var(--dim);
    transition:all .15s;white-space:nowrap;
  }
  .layer-pill:hover{color:var(--ink);background:rgba(244,236,224,.04)}
  .layer-pill.on{color:var(--ink);background:rgba(244,236,224,.08);box-shadow:inset 0 0 0 1px var(--line-3)}
  .layer-pill svg{flex-shrink:0}
  .layer-pill .ico{width:16px;height:16px;display:flex;align-items:center;justify-content:center;border-radius:3px}
  .layer-pill[data-k="staze"] .ico{background:#3a5a2a;color:#c8e6a8}
  .layer-pill[data-k="poi"] .ico{background:#2a4a6a;color:#a8d0e8}
  .layer-pill[data-k="reljef"] .ico{background:#6a4a2a;color:#e8c8a8}
  .layer-pill[data-k="topo"] .ico{background:#3a2a2a;color:#e8b8a8}
  .layer-pill .chev{opacity:.5;margin-left:2px}

  /* popover */
  .pop-anchor{position:relative}
  .popover{
    position:absolute;top:calc(100% + 6px);left:50%;transform:translateX(-50%);
    min-width:220px;background:var(--panel);border:1px solid var(--line-2);border-radius:8px;padding:6px;
    box-shadow:var(--shadow-lg);z-index:30;display:none;
  }
  .popover.on{display:block}
  .popover .row{
    display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--dim);
    transition:all .12s;
  }
  .popover .row:hover{background:rgba(244,236,224,.04);color:var(--ink)}
  .popover .row.on{color:var(--ink)}
  .popover .row .chk{
    width:16px;height:16px;border-radius:4px;border:1.5px solid var(--line-3);flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
  }
  .popover .row.on .chk{background:var(--amber);border-color:var(--amber)}
  .popover .row.on .chk::after{content:"";width:4px;height:8px;border:solid #1f1410;border-width:0 1.5px 1.5px 0;transform:rotate(45deg) translate(-1px,-1px)}
  .popover .row .sw{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .popover .row .lbl{flex:1}
  .popover hr{border:none;height:1px;background:var(--line);margin:4px 2px}

  /* ─ Right panel ────────────────────────────────────── */
  .side{
    position:absolute;top:14px;right:14px;bottom:14px;width:var(--w-panel);z-index:9;
    background:rgba(30,24,18,.96);border:1px solid var(--line-2);border-radius:10px;
    box-shadow:var(--shadow-lg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    display:flex;flex-direction:column;overflow:hidden;
  }
  .side-head{
    padding:16px 18px 12px;border-bottom:1px solid var(--line);
  }
  .side-head h3{
    font-family:var(--display);font-size:18px;font-weight:500;color:var(--ink);letter-spacing:-.01em;
  }
  .side-body{flex:1;overflow-y:auto;padding:14px 18px 18px}

  /* Info panel content */
  .r-title{font-family:var(--display);font-size:24px;font-weight:700;color:var(--amber);letter-spacing:-.015em;margin-bottom:12px}
  .r-stats{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
  .r-stats .row{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
  .r-stats .k{font-family:var(--sans);font-size:13px;color:var(--dim)}
  .r-stats .v{font-family:var(--display);font-size:18px;color:var(--ink);font-weight:500;font-variant-numeric:tabular-nums}
  .r-stats .v small{font-family:var(--sans);font-size:12px;color:var(--dim);font-weight:400;margin-left:2px}
  .stars{display:inline-flex;gap:2px;color:var(--amber)}
  .stars svg{width:14px;height:14px}
  .divider{height:1px;background:var(--line);margin:12px 0}
  .bullet-list{list-style:none;padding:0;margin:0}
  .bullet-list li{
    display:flex;align-items:flex-start;gap:8px;padding:6px 0;
    font-size:13.5px;color:var(--ink-2);line-height:1.4;
  }
  .bullet-list li::before{
    content:"";width:6px;height:6px;border-radius:50%;background:var(--amber);margin-top:8px;flex-shrink:0;
  }
  .route-switch{
    display:flex;background:var(--bg);border:1px solid var(--line-2);border-radius:6px;padding:2px;margin-top:14px;
  }
  .route-switch button{
    flex:1;padding:7px;font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--dim);
    border-radius:4px;transition:all .12s;
  }
  .route-switch button.on{background:var(--amber);color:#1f1410;font-weight:600}

  /* Gallery */
  .gallery-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .gal-item{
    aspect-ratio:4/3;border-radius:6px;overflow:hidden;position:relative;background:var(--panel-2);
    display:flex;align-items:center;justify-content:center;
  }
  .gal-item .ph{
    position:absolute;inset:0;
    background:
      linear-gradient(135deg, rgba(200,115,42,.15), rgba(60,40,25,.6)),
      radial-gradient(circle at 30% 30%, #5a3a22, #1f1610 70%);
  }
  .gal-item .lbl{position:relative;z-index:2;font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--amber);text-align:center;padding:6px}

  /* Contacts */
  .contact-block{margin-bottom:14px}
  .contact-block .h{
    font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);margin-bottom:6px;
  }
  .contact-block a,.contact-block .v{
    display:block;font-size:13.5px;color:var(--ink-2);margin-bottom:3px;
  }
  .contact-block a:hover{color:var(--amber)}

  /* ─ Elevation strip (bottom) ──────────────────────── */
  .strip{
    flex-shrink:0;height:var(--h-strip);border-top:1px solid var(--line);background:var(--panel);
    display:flex;align-items:stretch;padding:10px 14px 10px 16px;gap:12px;position:relative;z-index:15;
  }
  .strip-prof{flex:1;display:flex;flex-direction:column;min-width:0}
  .strip-head{display:flex;align-items:center;gap:10px;margin-bottom:4px}
  .strip-head .ttl{
    display:flex;align-items:center;gap:6px;
    font-family:var(--mono);font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);
  }
  .strip-head .ttl svg{color:var(--amber)}
  .strip-head .sub{font-family:var(--sans);font-size:11px;color:var(--dim);margin-left:auto;font-variant-numeric:tabular-nums}
  .prof-wrap{flex:1;position:relative;min-height:0}
  #elev-svg{display:block;width:100%;height:100%;cursor:crosshair}
  .axis{position:absolute;left:0;right:0;bottom:-2px;display:flex;justify-content:space-between;padding:0 4px;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;pointer-events:none}
  .y-axis{position:absolute;left:2px;top:0;bottom:10px;display:flex;flex-direction:column;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.08em;pointer-events:none}
  #prof-tip{
    position:absolute;transform:translate(-50%,-110%);
    background:var(--panel-2);border:1px solid var(--line-3);border-radius:4px;padding:5px 8px;
    font-family:var(--mono);font-size:11px;color:var(--ink);letter-spacing:.04em;white-space:nowrap;
    pointer-events:none;opacity:0;transition:opacity .1s;z-index:2;
  }
  #prof-tip::after{
    content:"";position:absolute;top:100%;left:50%;transform:translateX(-50%);
    border:4px solid transparent;border-top-color:var(--panel-2);
  }
  #prof-cur{position:absolute;top:0;bottom:0;width:1px;background:var(--amber);opacity:0;pointer-events:none}
  .strip-actions{
    display:flex;align-items:flex-end;gap:6px;flex-shrink:0;
  }
  .act-btn{
    display:flex;align-items:center;gap:6px;padding:8px 12px;
    background:var(--panel-2);border:1px solid var(--line-2);border-radius:6px;
    font-family:var(--sans);font-size:12px;font-weight:500;color:var(--ink-2);
    transition:all .15s;
  }
  .act-btn:hover{background:var(--panel-3);color:var(--ink);border-color:var(--line-3)}
  .act-btn.round{padding:8px;width:32px;height:32px;justify-content:center}
  .act-btn svg{color:var(--amber)}
  .act-btn.primary{
    background:var(--amber);color:#1a2a40;border-color:var(--amber);font-weight:700;
    box-shadow:0 2px 8px rgba(255,200,64,.3);
  }
  .act-btn.primary svg{color:#1a2a40}
  .act-btn.primary:hover{background:var(--amber-deep);border-color:var(--amber-deep);color:#fff}
  .act-btn.primary:hover svg{color:#fff}

  /* ─ Custom markers ────────────────────────────────── */
  .mk{
    position:relative;
    display:flex;align-items:center;gap:6px;
    background:rgba(30,24,18,.98);border:1px solid var(--line-3);border-radius:4px;
    padding:4px 9px 4px 4px;
    font-family:var(--sans);font-size:11px;font-weight:600;color:var(--ink);
    box-shadow:0 2px 6px rgba(0,0,0,.45);
    white-space:nowrap;cursor:pointer;transition:transform .12s;
    transform-origin:bottom center;
  }
  .mk:hover{transform:scale(1.05)}
  .mk .mico{
    width:20px;height:20px;border-radius:3px;
    display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;
  }
  .mk.start{background:rgba(26,40,20,.98);border-color:#4a7a30}
  .mk.start .mico{background:#5a8a3a}
  .mk.finish{background:rgba(40,20,20,.98);border-color:#a0453a}
  .mk.finish .mico{background:#c8453a}
  .mk.checkpoint{background:rgba(20,34,44,.98);border-color:#4a7a94}
  .mk.checkpoint .mico{background:#2a88c8}
  .mk.viewpoint{background:rgba(26,40,20,.98);border-color:#5a7a3a}
  .mk.viewpoint .mico{background:#5a8a3a}
  .mk.medical{background:rgba(40,20,20,.98);border-color:#a0453a}
  .mk.medical .mico{background:#e06666}
  .mk.video{background:rgba(30,26,14,.98);border-color:#a88830;color:var(--amber)}
  .mk.video .mico{background:#c89020;color:#2a1e10}
  .mk.finish-tourist{background:rgba(30,26,14,.98);border-color:#a88830;color:var(--amber)}
  .mk.finish-tourist .mico{background:#c89020;color:#2a1e10}
  .mk::after{
    content:"";position:absolute;top:100%;left:10px;
    border:6px solid transparent;border-top-color:currentColor;opacity:.4;
  }

  /* OSM POI dots */
  .poi-dot-outer{
    width:22px;height:22px;background:#fff;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,.35);
    display:flex;align-items:center;justify-content:center;cursor:pointer;
    transition:transform .12s;
  }
  .poi-dot-outer:hover{transform:scale(1.15)}
  .poi-dot-inner{width:12px;height:12px;border-radius:50%}

  /* ─ Rich POI popup ────────────────────────────────── */
  .maplibregl-popup-content{
    background:var(--panel)!important;color:var(--ink)!important;
    border:1px solid var(--line-2)!important;border-radius:8px!important;
    padding:0!important;box-shadow:var(--shadow-lg)!important;
    font-family:var(--sans)!important;max-width:270px;overflow:hidden;
  }
  .maplibregl-popup-tip{border-top-color:var(--panel)!important;border-bottom-color:var(--panel)!important}
  .maplibregl-popup-close-button{color:var(--dim)!important;font-size:18px!important;padding:2px 7px!important;z-index:3}
  .rp{display:flex;flex-direction:column}
  .rp .hero{
    height:96px;position:relative;overflow:hidden;
    background:
      linear-gradient(180deg,rgba(30,24,18,0) 0%,rgba(30,24,18,.8) 100%),
      linear-gradient(135deg, #6a4a2a, #3a1f10),
      radial-gradient(circle at 30% 40%, rgba(232,165,92,.4), transparent 60%);
  }
  .rp .hero .tag{
    position:absolute;top:8px;left:8px;padding:3px 8px;border-radius:3px;
    background:rgba(20,16,12,.75);border:1px solid var(--line-2);
    font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;
    display:flex;align-items:center;gap:5px;color:var(--ink);
  }
  .rp .hero .tag .sw{width:7px;height:7px;border-radius:50%}
  .rp .body{padding:10px 14px 12px}
  .rp .nm{font-family:var(--display);font-size:16px;font-weight:600;color:var(--ink);line-height:1.2;margin-bottom:4px}
  .rp .ty{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--dim);margin-bottom:8px}
  .rp .meta{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-bottom:8px}
  .rp .meta .k{font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--dim)}
  .rp .meta .v{font-size:12px;color:var(--ink);font-variant-numeric:tabular-nums}
  .rp .cta{
    display:flex;align-items:center;gap:6px;padding:6px 10px;width:100%;justify-content:center;
    background:var(--amber);color:#1f1410;border-radius:4px;font-weight:600;font-size:11.5px;
    letter-spacing:.02em;transition:all .15s;
  }
  .rp .cta:hover{background:var(--amber-deep);color:#fff}
  .rp .cta.yt{background:#e84a3c;color:#fff}
  .rp .cta.yt:hover{background:#c8342a}

  /* ─ MapLibre overrides (dark) ─────────────────────── */
  .maplibregl-ctrl-attrib{
    background:rgba(30,24,18,.85)!important;color:var(--dim)!important;
    font-family:var(--mono)!important;font-size:9px!important;padding:3px 6px!important;
  }
  .maplibregl-ctrl-attrib a{color:var(--amber)!important}
  .maplibregl-ctrl-group{
    background:rgba(30,24,18,.92)!important;border:1px solid var(--line-2)!important;
    box-shadow:var(--shadow)!important;border-radius:6px!important;
  }
  .maplibregl-ctrl button{background:transparent!important}
  .maplibregl-ctrl button span{filter:invert(.85) hue-rotate(180deg)}
  .maplibregl-ctrl-scale{
    background:rgba(30,24,18,.75)!important;border-color:var(--line-2)!important;color:var(--ink-2)!important;
    font-family:var(--mono)!important;font-size:10px!important;
  }

/* ─────────────────────────────────────────────────────
   Geometry helpers
   ───────────────────────────────────────────────────── */
function haversine(a,b){
  const R=6371000,toRad=x=>x*Math.PI/180;
  const dLat=toRad(b[1]-a[1]),dLon=toRad(b[0]-a[0]);
  const s1=Math.sin(dLat/2),s2=Math.sin(dLon/2);
  const q=s1*s1+Math.cos(toRad(a[1]))*Math.cos(toRad(b[1]))*s2*s2;
  return 2*R*Math.atan2(Math.sqrt(q),Math.sqrt(1-q));
}
function pointToSegmentM(p,a,b){
  const lr=(a[1]+b[1])/2*Math.PI/180;
  const mx=111320*Math.cos(lr),my=110540;
  const ax=a[0]*mx,ay=a[1]*my,bx=b[0]*mx,by=b[1]*my,px=p[0]*mx,py=p[1]*my;
  const dx=bx-ax,dy=by-ay;
  const tt=Math.max(0,Math.min(1,((px-ax)*dx+(py-ay)*dy)/(dx*dx+dy*dy||1)));
  return Math.hypot(px-(ax+tt*dx),py-(ay+tt*dy));
}
function minDistToRoute(p,coords){
  let best=Infinity;
  for(let i=1;i<coords.length;i++){
    const d=pointToSegmentM(p,coords[i-1],coords[i]); if(d<best)best=d;
  }
  return best;
}
function bboxOf(coords,pad){
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  for(const c of coords){ if(c[0]<x0)x0=c[0]; if(c[0]>x1)x1=c[0]; if(c[1]<y0)y0=c[1]; if(c[1]>y1)y1=c[1]; }
  return [x0-pad,y0-pad,x1+pad,y1+pad];
}
function coordAtRatio(coords,r){
  // pick coord at linear-distance fraction r
  const stats=routeStats(coords);
  const target=r*stats.dist;
  for(let i=1;i<stats.cum.length;i++){
    if(stats.cum[i]>=target){
      return coords[i];
    }
  }
  return coords[coords.length-1];
}
function routeStats(coords){
  let dist=0,gain=0,max=-Infinity,min=Infinity;
  const cum=[0];
  for(let i=1;i<coords.length;i++){
    const d=haversine(coords[i-1],coords[i]); dist+=d; cum.push(dist);
    const dz=coords[i][2]-coords[i-1][2]; if(dz>0)gain+=dz;
    if(coords[i][2]>max)max=coords[i][2]; if(coords[i][2]<min)min=coords[i][2];
  }
  return {dist,gain,max,min,cum};
}

/* ─────────────────────────────────────────────────────
   Map
   ───────────────────────────────────────────────────── */
function buildStyle(){
  const bm=BASEMAPS[state.basemap];
  return {version:8,glyphs:"https://fonts.openmaptiles.org/{fontstack}/{range}.pbf",
    sources:{base:bm,terrain:TERRAIN_SRC},
    layers:[{id:"base",type:"raster",source:"base"}],
  };
}

function initMap(){
  state.map=new maplibregl.Map({
    container:"map",style:buildStyle(),
    center:[18.1,43.5],zoom:8,hash:false,attributionControl:{compact:true},
    pitchWithRotate:true,
  });
  state.map.addControl(new maplibregl.NavigationControl({showCompass:true,visualizePitch:true}),"right");
  state.map.addControl(new maplibregl.ScaleControl({maxWidth:100,unit:"metric"}),"bottom-right");
  state.map.on("load",onStyleReady);
  state.map.on("styledata",()=>{
    if(!state.map.getSource("route-main")) onStyleReady();
  });
}
function onStyleReady(){
  if(state.map.getSource("route-main"))return;
  // sources
  state.map.addSource("route-main",{type:"geojson",data:empty()});
  state.map.addSource("route-alt",{type:"geojson",data:empty()});
  // layers (route alt faded, main with halo)
  state.map.addLayer({id:"route-alt-l",type:"line",source:"route-alt",
    paint:{"line-color":"#f4ece0","line-width":2,"line-opacity":.25,"line-dasharray":[2,2]}});
  state.map.addLayer({id:"route-main-halo",type:"line",source:"route-main",
    layout:{"line-cap":"round","line-join":"round"},
    paint:{"line-color":"#1f1410","line-width":8,"line-opacity":.6}});
  state.map.addLayer({id:"route-main-glow",type:"line",source:"route-main",
    layout:{"line-cap":"round","line-join":"round"},
    paint:{"line-color":"#4a8ed8","line-width":6,"line-opacity":.35,"line-blur":3}});
  state.map.addLayer({id:"route-main-l",type:"line",source:"route-main",
    layout:{"line-cap":"round","line-join":"round"},
    paint:{"line-color":"#4a8ed8","line-width":4}});

  if(state.view3d) apply3D();
  if(state.active){ renderActive(); }
}
function empty(){ return {type:"FeatureCollection",features:[]}; }

function apply3D(){
  if(!state.map.getSource("terrain"))state.map.addSource("terrain",TERRAIN_SRC);
  state.map.setTerrain({source:"terrain",exaggeration:1.4});
  state.map.easeTo({pitch:56,bearing:-14,duration:700});
}
function apply2D(){
  state.map.setTerrain(null);
  state.map.easeTo({pitch:0,bearing:0,duration:600});
}
function applyBasemap(){
  state.map.setStyle(buildStyle());
  // onStyleReady re-adds sources/layers
  setTimeout(()=>{ renderActive(); renderMarkers(); renderPoiMarkers(); },150);
}

/* ─────────────────────────────────────────────────────
   Route rendering
   ───────────────────────────────────────────────────── */
function renderActive(){
  if(!state.active||!state.map.isStyleLoaded()||!state.map.getSource("route-main"))return;
  const on=state.layers.staze;
  state.map.getSource("route-main").setData(on?{type:"FeatureCollection",features:[{
    type:"Feature",geometry:{type:"LineString",coordinates:state.active.coords.map(c=>[c[0],c[1]])}
  }]}:empty());
  const alt=state.routes.find(r=>r!==state.active);
  state.map.getSource("route-alt").setData(on&&alt?{type:"FeatureCollection",features:[{
    type:"Feature",geometry:{type:"LineString",coordinates:alt.coords.map(c=>[c[0],c[1]])}
  }]}:empty());
  if(on){ fitActive(); }
  state.stats=routeStats(state.active.coords);
  renderElevation();
  renderSide();
  renderMarkers();
}
function fitActive(){
  if(!state.active)return;
  const bb=bboxOf(state.active.coords,0);
  const panelOffsetRight = (window.innerWidth>680 && state.panelOpen) ? 340 : 20;
  state.map.fitBounds([[bb[0],bb[1]],[bb[2],bb[3]]],
    {padding:{top:80,right:panelOffsetRight,bottom:40,left:40},duration:800,pitch:state.view3d?56:0});
}

/* ─────────────────────────────────────────────────────
   Event markers (start/finish/checkpoints/video/viewpoints)
   ───────────────────────────────────────────────────── */
function clearMarkers(){ state.markers.forEach(m=>m.remove()); state.markers=[]; }
function renderMarkers(){
  clearMarkers();
  if(!state.active||!state.map.isStyleLoaded())return;
  const coords=state.active.coords;
  if(!coords.length)return;

  // START
  pushMk(coords[0],"start",LANG==="sr"?"START":"START","play");
  // FINISH
  pushMk(coords[coords.length-1],"finish",LANG==="sr"?"FINISH":"FINISH","flag");

  // event-specific markers for this route
  for(const m of EVENT_MARKERS){
    if(m.route!==state.active.key)continue;
    const c=coordAtRatio(coords,m.atRatio);
    const label=m.label[LANG]||m.label.bs||m.label.sr;
    const icon = m.kind==="checkpoint"?"drop"
      :(m.kind==="viewpoint"?"peak"
      :(m.kind==="medical"?"plus"
      :(m.kind==="video"?"play"
      :(m.kind==="finish-tourist"?"pin":"pin"))));
    const el=mkEl(m.kind,label,icon);
    el.addEventListener("click",(e)=>{
      e.stopPropagation();
      openRichPopup(c,m);
    });
    const marker=new maplibregl.Marker({element:el,anchor:"bottom"}).setLngLat([c[0],c[1]]).addTo(state.map);
    state.markers.push(marker);
  }
}
function pushMk(c,kind,label,icon){
  const el=mkEl(kind,label,icon);
  const marker=new maplibregl.Marker({element:el,anchor:"bottom"}).setLngLat([c[0],c[1]]).addTo(state.map);
  state.markers.push(marker);
}
function mkEl(kind,label,icon){
  const el=document.createElement("div");
  el.className="mk "+kind;
  el.innerHTML=`<span class="mico">${iconSvg(icon)}</span><span>${escapeHtml(label)}</span>`;
  return el;
}
function iconSvg(k){
  const base='stroke="currentColor" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"';
  switch(k){
    case "play": return `<svg width="10" height="10" viewBox="0 0 24 24" ${base}><polygon points="6 4 20 12 6 20 6 4" fill="currentColor"/></svg>`;
    case "flag": return `<svg width="10" height="10" viewBox="0 0 24 24" ${base}><path d="M5 3 L5 21" /><path d="M5 4 Q11 0 17 4 T21 4 L21 13 Q15 17 9 13 T5 13z" fill="currentColor" stroke="none"/></svg>`;
    case "drop": return `<svg width="10" height="10" viewBox="0 0 24 24" ${base}><path d="M12 3 C8 9 6 13 6 16 a6 6 0 0 0 12 0 c0-3-2-7-6-13z" fill="currentColor" stroke="none"/></svg>`;
    case "peak": return `<svg width="10" height="10" viewBox="0 0 24 24" ${base}><path d="M3 20 L9 10 L13 16 L16 12 L21 20z" fill="currentColor" stroke="none"/></svg>`;
    case "plus": return `<svg width="10" height="10" viewBox="0 0 24 24" ${base} stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
    case "pin":
    default: return `<svg width="10" height="10" viewBox="0 0 24 24" ${base}><path d="M12 2 C7 2 4 6 4 10 c0 5 8 12 8 12 s8-7 8-12 c0-4-3-8-8-8z" fill="currentColor" stroke="none"/></svg>`;
  }
}

      <div class="hero"><span class="tag"><span class="sw" style="background:${kindColor}"></span>${t(catKey)}</span></div>

        <div class="nm">${escapeHtml(m.name||"—")}</div>

function escapeHtml(s){ return (s||"").toString().replace(/[&<>\"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c]); }

async function fetchPois(){
  if(!state.active||state.poiLoading)return;
  state.poiLoading=true;
  const bb=bboxOf(state.active.coords,POI_BBOX_BUFFER);
  const bbox=`${bb[1]},${bb[0]},${bb[3]},${bb[2]}`;
  const qs=Object.values(POI_CATS).map(c=>c.q).join("");
  const q=`[out:json][timeout:30][bbox:${bbox}];(${qs});out;`;
  let resp=null,err=null;
  for(const url of OVERPASS_ENDPOINTS){
    try{
      const r=await fetch(url,{method:"POST",body:"data="+encodeURIComponent(q)});
      if(!r.ok){err=`HTTP ${r.status}`;continue;}
      resp=await r.json();break;
    }catch(e){err=e.message;}
  }
  state.poiLoading=false;
  if(!resp){ toast("Overpass: "+(err||"unreachable"),true); return; }
  const seen=new Set(),pois=[];
  for(const el of resp.elements||[]){
    if(el.type!=="node")continue;
    const tg=el.tags||{},cat=classify(tg); if(!cat)continue;
    const dist=minDistToRoute([el.lon,el.lat],state.active.coords);
    if(dist>POI_CORRIDOR_M)continue;
    const k=`${el.lon.toFixed(5)},${el.lat.toFixed(5)},${cat}`;
    if(seen.has(k))continue; seen.add(k);
    pois.push({id:el.id,lon:el.lon,lat:el.lat,tags:tg,cat,dist});
  }
  state.pois=pois;
  state.poisByCat={};
  for(const k of Object.keys(POI_CATS)) state.poisByCat[k]=[];
  for(const p of pois) state.poisByCat[p.cat].push(p);
  renderPoiPopover();
  renderPoiMarkers();
}

        const meta=ROUTE_META[r.key]||{};

        return `<button data-r="${r.key}" class="${state.active?.key===r.key?"on":""}">${short}</button>`;

/* ─────────────────────────────────────────────────────
   Elevation profile
   ───────────────────────────────────────────────────── */
function renderElevation(){
  if(!state.active) return;
  const svg=document.getElementById("elev-svg");
  const s=state.stats;
  const W=1000,H=80,P=4;
  const coords=state.active.coords;
  const xs=s.cum.map(c=>P+(c/s.dist)*(W-2*P));
  const yr=(s.max-s.min)||1;
  const ys=coords.map(c=>P+(1-(c[2]-s.min)/yr)*(H-2*P));
  const area=`M ${xs[0].toFixed(1)} ${H-P} L `+xs.map((x,i)=>`${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(" L ")+` L ${xs[xs.length-1].toFixed(1)} ${H-P} Z`;
  const line=`M `+xs.map((x,i)=>`${x.toFixed(1)} ${ys[i].toFixed(1)}`).join(" L ");
  svg.innerHTML=`
    <defs>
      <linearGradient id="elevg" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#ffc840" stop-opacity="0.55"/>
        <stop offset="100%" stop-color="#4a8ed8" stop-opacity="0.10"/>
      </linearGradient>
    </defs>
    <path d="${area}" fill="url(#elevg)"/>
    <path d="${line}" fill="none" stroke="#ffc840" stroke-width="1.4" vector-effect="non-scaling-stroke"/>
  `;
  // y-axis labels
  const y=document.getElementById("y-axis");
  y.innerHTML=`<div>${Math.round(s.max)} m</div><div>${Math.round((s.max+s.min)/2)} m</div><div>${Math.round(s.min)} m</div>`;
  // x-axis labels (~5 ticks)
  const x=document.getElementById("x-axis");
  const total=(s.dist/1000).toFixed(1);
  const ticks=5;
  let xh="";
  for(let i=0;i<=ticks;i++){
    const km=((s.dist/1000)*i/ticks).toFixed(0);
    xh+=`<span>${km} km</span>`;
  }
  x.innerHTML=xh;
  document.getElementById("strip-sub").textContent =
    `${(s.dist/1000).toFixed(1)} km · ${Math.round(s.gain)} m ↑ · ${Math.round(s.max)} m max`;
  wireProfileHover(coords,s);
}
function wireProfileHover(coords,s){
  const wrap=document.getElementById("prof-wrap");
  const tip=document.getElementById("prof-tip");
  const cur=document.getElementById("prof-cur");
  wrap.onmousemove=(e)=>{
    const rc=wrap.getBoundingClientRect();
    const x=Math.max(0,Math.min(rc.width,e.clientX-rc.left));
    const frac=x/rc.width;
    const target=frac*s.dist;
    let i=0;
    for(;i<s.cum.length;i++){ if(s.cum[i]>=target)break; }
    i=Math.min(i,coords.length-1);
    const km=(s.cum[i]/1000).toFixed(1);
    const ele=Math.round(coords[i][2]);
    tip.textContent=`${km} km · ${ele} m`;
    tip.style.left=x+"px";
    tip.style.top=(Math.max(0,Math.min(rc.height-4, (1-(coords[i][2]-s.min)/((s.max-s.min)||1))*rc.height))+4)+"px";
    tip.style.opacity=1;
    cur.style.left=x+"px"; cur.style.opacity=.7;
  };
  wrap.onmouseleave=()=>{ tip.style.opacity=0; cur.style.opacity=0; };
}

/* ─────────────────────────────────────────────────────
   UI wiring
   ───────────────────────────────────────────────────── */
function wireUI(){
  // Top-nav tabs
  document.querySelectorAll(".topnav button[data-tab]").forEach(b=>{
    b.addEventListener("click",()=>{
      document.querySelectorAll(".topnav button[data-tab]").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      state.tab=b.dataset.tab;
      renderSide();
      if(window.innerWidth<=680) document.getElementById("side").classList.add("open");
    });
  });
  // Lang toggle
  document.querySelectorAll(".lang-pill button").forEach(b=>{
    b.addEventListener("click",()=>{
      document.querySelectorAll(".lang-pill button").forEach(x=>x.classList.remove("on"));
      b.classList.add("on");
      LANG=b.dataset.lang; localStorage.setItem("falc.lang",LANG);
      applyI18n(); renderSide(); renderPoiPopover(); renderMarkers();
    });
  });

  // Pills
  document.getElementById("pill-staze").addEventListener("click",(e)=>{
    if(e.target.closest(".popover"))return;
    state.layers.staze=!state.layers.staze;
    e.currentTarget.classList.toggle("on",state.layers.staze);
    renderActive();
  });
  document.getElementById("pill-reljef").addEventListener("click",(e)=>{
    if(e.target.closest(".popover"))return;
    state.view3d=!state.view3d;
    e.currentTarget.classList.toggle("on",state.view3d);
    if(state.view3d)apply3D(); else apply2D();
  });
  // POI pill — toggles layer OR opens popover via chevron
  document.getElementById("pill-poi").addEventListener("click",(e)=>{
    if(e.target.closest(".popover"))return;
    // if clicked on chevron zone, open popover; else toggle
    const pill=e.currentTarget;
    if(e.target.closest(".chev")){
      const pop=document.getElementById("pop-poi");
      closePopovers();
      pop.classList.add("on");
      return;
    }
    state.layers.poi=!state.layers.poi;
    pill.classList.toggle("on",state.layers.poi);
    renderPoiMarkers();
  });
  // Topo pill -> basemap popover
  document.getElementById("pill-topo").addEventListener("click",(e)=>{
    if(e.target.closest(".popover"))return;
    const pop=document.getElementById("pop-basemap");
    const open=!pop.classList.contains("on");
    closePopovers();
    if(open){ pop.classList.add("on"); renderBasemapPopover(); }
    e.currentTarget.classList.toggle("on", state.basemap==="topo" || open);
  });
  document.addEventListener("click",(e)=>{
    if(!e.target.closest(".pop-anchor")) closePopovers();
  });

  // Mobile: tapping side-head toggles open/closed
  document.getElementById("side-head").addEventListener("click",()=>{
    if(window.innerWidth<=680){
      const s=document.getElementById("side");
      s.classList.toggle("open");
    }
  });

  // Actions — download the pre-built GPX for the active stage
  document.getElementById("act-gpx").addEventListener("click",()=>{
    if(!state.active)return;
    const a=document.createElement("a");
    a.href=`gpx/${state.active.key}.gpx`;
    a.download=`Tour_of_BiH_${state.active.key}.gpx`;
    a.click();
  });
  document.getElementById("act-share").addEventListener("click",async()=>{
    const shareData={title:"Tour of Bosnia and Herzegovina",text:"Od planina do mora — 5 etapa od Sarajeva do Neuma",url:location.href};
    try{ if(navigator.share)await navigator.share(shareData);
      else { await navigator.clipboard.writeText(location.href); toast(LANG==="bs"?"Link kopiran":"Link copied"); } }
    catch(_){}
  });
  document.getElementById("act-info").addEventListener("click",()=>{
    state.tab="info";
    document.querySelectorAll(".topnav button[data-tab]").forEach(x=>x.classList.toggle("on",x.dataset.tab==="info"));
    renderSide();
    if(window.innerWidth<=680) document.getElementById("side").classList.add("open");
  });

  // Set initial lang pill state
  document.querySelectorAll(".lang-pill button").forEach(b=>b.classList.toggle("on",b.dataset.lang===LANG));
  // Hover close popovers on resize
  window.addEventListener("resize",()=>{ fitActive(); });
}

/* ─────────────────────────────────────────────────────
   Toast
   ───────────────────────────────────────────────────── */
let toastT;
function toast(msg,err){
  const el=document.getElementById("toast");
  el.textContent=msg; el.classList.toggle("err",!!err); el.classList.add("on");
  clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("on"),3000);
}

/* ─────────────────────────────────────────────────────
   Boot
   ───────────────────────────────────────────────────── */
(async function boot(){
  applyI18n();
  initMap();
  wireUI();
  renderPoiPopover();
  renderSide();

  const routes=await loadRoutes();
  if(!routes.length){ toast("Route data unavailable",true); return; }
  state.routes=routes;
  state.active=routes.find(r=>r.key==="stage1")||routes[0];
  if(state.map.isStyleLoaded()&&state.map.getSource("route-main")){
    renderActive();
  } else {
    state.map.once("load",()=>renderActive());
  }
  setTimeout(fetchPois,600);
})();
</script>
